<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="title" property="og:title" content="2025 Elections | Mapping the Philippines">
  <meta name="type" property="og:type" content="website">
  <meta name="url" property="og:url" content="pupstc.github.io">

  <title>Powerplants in the Philippines</title>

  <style>
    .legendsColor {
      width: 20px;
      height: 20px;
      border-radius: 20px;
    }

    .glass {
      background-color: rgba(255, 255, 255, 0.5) !important;
      backdrop-filter: blur(1px) brightness(110%) !important;
      color: rgb(0, 0, 0) !important;
      box-shadow: inset 1px 1px 5px 3px rgb(255, 255, 255) !important;
      border: unset !important;
      text-shadow: 0px 0px 2px rgb(255, 255, 255) !important;
    }

    .glass:hover {
      background-color: rgba(255, 255, 255, 0.9) !important;
      box-shadow: inset 0px 0px 5px 10px rgb(255, 255, 255) !important;
    }

    .glass:disabled {
      background-color: rgba(175, 175, 175, 0.5) !important;
      color: grey !important;
      box-shadow: unset !important;
    }

    #sidebar {
      max-height: 100vh;
      overflow-y: auto;
    }

    #map {
      height: 100vh;
    }
  </style>

  <link rel="icon" href="../assets/img/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body id="body">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="row position-relative">

          <div class="position-absolute w-100 top-0 z-2 py-3">
            <div class="d-flex flex-row justify-content-between align-items-baseline align-items-sm-center">
              <div class="d-flex flex-row flex-start align-items-center">
                <a href="../" class="nav-link ms-3">
                  <div class="h4 mb-0">
                    Powerplants in the Philippines
                  </div>
                </a>
              </div>
            </div>
            <div class="d-flex flex-row justify-content-center">
              <div id="loading" class="text-center spinner-grow d-none" role="status"></div>
            </div>
          </div>

          <div id="sidebar" class="position-absolute top-0 z-1 col-4 col-sm-3 col-lg-2 py-5">
            <div class="py-3 px-2 mt-5">
              <div class="mb-3">
                <label for="filterRegion" class="form-label my-0"><small>Region</small></label>
                <select id="filterRegion" class="glass rounded-2 form-select form-select-sm">
                  <option value="ALL">ALL</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="filterProvince" class="form-label my-0"><small>Province</small></label>
                <select id="filterProvince" class="glass rounded-2 form-select form-select-sm">
                  <option value="ALL">ALL</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="filterFuelType" class="form-label my-0"><small>Fuel Type</small></label>
                <select id="filterFuelType" class="glass rounded-2 form-select form-select-sm">
                  <option value="ALL">ALL</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="filterSearch" class="form-label my-0"><small>Search Plant</small></label>
                <input id="filterSearch" type="text" class="glass rounded-2 form-control form-control-sm" placeholder="Type plant name">
              </div>

              <div class="d-grid gap-2">
                <button id="applyFiltersBtn" class="glass btn rounded-5 px-3 py-2" type="button">
                  Apply Filters
                </button>
                <button id="resetFiltersBtn" class="glass btn rounded-5 px-3 py-2" type="button">
                  Reset
                </button>
              </div>

              <div class="mt-3">
                <small id="resultSummary">Loading data...</small>
              </div>
            </div>
          </div>

          <div id="map" class="z-0"></div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/mapping.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      renderMap();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
